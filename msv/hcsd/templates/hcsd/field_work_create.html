{% extends "hcsd/field_work_base.html" %}
{% block title %}إنشاء أمر عمل ميداني{% endblock %}
{% block content %}
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink-1:#1a2a3a;--ink-2:#3a4a5a;--ink-3:#5a6a7a;--ink-4:#8a9aaa;--surface-1:#f4f6f8;--surface-2:#e8ecf0;--border:#d0d8e0;--accent:#1a5c9a;--danger:#8a1a1a;--danger-bg:#fdeaea;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--surface-1);color:var(--ink-1);direction:rtl;}
.fw-page{max-width:680px;margin:0 auto;padding:24px 16px;}
.fw-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.fw-title{font-size:20px;font-weight:700;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;border:none;transition:.15s;}
.btn-outline{background:#fff;color:var(--ink-2);border:1.5px solid var(--border);}
.btn-outline:hover{background:var(--surface-2);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#14487a;}
.card{background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:24px;}
.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px;}
.form-control{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;direction:rtl;background:#fff;color:var(--ink-1);transition:.15s;}
.form-control:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,92,154,.12);}
textarea.form-control{resize:vertical;min-height:90px;}
.error-box{background:var(--danger-bg);border:1.5px solid #f5c0c0;border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:14px;color:var(--danger);}
.error-box ul{padding-right:18px;margin-top:6px;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;}
</style>

<section class="fw-page">
  <div class="fw-header">
    <h1 class="fw-title">إنشاء أمر عمل ميداني جديد</h1>
    <a href="{% url 'field_work_list' %}" class="btn btn-outline">← رجوع</a>
  </div>

  {% if errors %}
  <div class="error-box">
    <strong>يرجى مراجعة الأخطاء:</strong>
    <ul>{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>
  </div>
  {% endif %}

  <div class="card">
    <form method="post" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label">اسم الموقع</label>
        <input type="text" name="site_name" class="form-control"
               value="{{ post.site_name|default:'' }}"
               placeholder="مثال: مجمع الشيخ خليفة، سوق الخضار...">
      </div>

      <div class="form-group">
        <label class="form-label">نوع العمل <span style="color:#c94a4a;">*</span></label>
        <input type="text" name="work_type" class="form-control"
               value="{{ post.work_type|default:'' }}"
               placeholder="مثال: رش مبيدات، تنظيف، مكافحة حشرات...">
      </div>

      <div class="form-group">
        <label class="form-label">العنوان</label>
        <input type="text" name="location" class="form-control"
               value="{{ post.location|default:'' }}"
               placeholder="العنوان التفصيلي للموقع">
      </div>

      <div class="form-group">
        <label class="form-label">تاريخ التنفيذ</label>
        <input type="date" name="work_date" class="form-control"
               value="{{ post.work_date|default:'' }}">
      </div>

      <div class="form-group">
        <label class="form-label">وصف العمل</label>
        <textarea name="description" class="form-control"
                  placeholder="تفاصيل إضافية عن العمل المطلوب...">{{ post.description|default:'' }}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">ملاحظات</label>
        <textarea name="notes" class="form-control"
                  placeholder="أي ملاحظات أخرى...">{{ post.notes|default:'' }}</textarea>
      </div>

      <div class="form-actions">
        <a href="{% url 'field_work_list' %}" class="btn btn-outline">إلغاء</a>
        <button type="submit" class="btn btn-primary">إنشاء الأمر</button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
